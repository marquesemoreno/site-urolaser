<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Página não encontrada | TIVDC</title>
    <meta name="robots" content="noindex, follow" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #0a0e1a;
        color: #e6edf3;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 24px;
      }
      .container { max-width: 480px; }
      .error-code {
        font-size: 96px;
        font-weight: 800;
        background: linear-gradient(135deg, #3b82f6, #8b5cf6);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1;
        margin-bottom: 16px;
      }
      h1 { font-size: 24px; font-weight: 600; margin-bottom: 12px; }
      p { color: #8b949e; font-size: 16px; line-height: 1.6; margin-bottom: 32px; }
      a {
        display: inline-block;
        background: linear-gradient(135deg, #3b82f6, #8b5cf6);
        color: #fff;
        text-decoration: none;
        padding: 14px 28px;
        border-radius: 10px;
        font-weight: 600;
        transition: transform 0.2s ease;
      }
      a:hover { transform: translateY(-2px); }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="error-code">404</div>
      <h1>Página não encontrada</h1>
      <p>A página que você procura pode ter sido movida, removida ou nunca existiu.</p>
      <a href="https://tivdc.com.br/">Voltar ao início</a>
    </div>
  </body>
</html>
